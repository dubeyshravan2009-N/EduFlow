<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow Pro | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black text-indigo-600">EDUFLOW <span class="text-slate-400 font-light text-sm">SECURE</span></h1>
        <div id="status-tag" class="hidden px-3 py-1 rounded-full text-xs font-bold uppercase"></div>
        <button id="logout-btn" onclick="secureLogout()" class="hidden text-red-500 font-bold text-sm hover:underline">Logout</button>
    </nav>

    <main class="max-w-5xl mx-auto p-4 mt-6">

        <section id="screen-login" class="screen active">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">System Login</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase">User ID / Roll No</label>
                        <input id="auth-id" type="text" placeholder="10A-1 or teacher" class="w-full border rounded-xl p-3 mt-1">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase">Security Password</label>
                        <input id="auth-pass" type="password" placeholder="••••••••" class="w-full border rounded-xl p-3 mt-1">
                    </div>
                    <button onclick="attemptSecureLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition-all">Enter Portal</button>
                </div>
            </div>
        </section>

        <section id="screen-teacher" class="screen">
            <div class="bg-white p-6 rounded-2xl shadow-md border mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Class Record Management</h2>
                    <select id="class-filter" onchange="loadStudents()" class="border p-2 rounded-lg">
                        <option value="10A">Class 10A</option>
                        <option value="10B">Class 10B</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-3 text-xs font-bold text-slate-400">Roll</th>
                                <th class="p-3 text-xs font-bold text-slate-400">Student Name</th>
                                <th class="p-3 text-xs font-bold text-slate-400">Set Password</th>
                                <th class="p-3 text-xs font-bold text-slate-400">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-rows"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="screen-parent" class="screen">
            <div id="parent-content"></div>
        </section>

        <section id="screen-admin" class="screen">
            <div class="bg-red-50 border border-red-200 p-8 rounded-3xl">
                <h2 class="text-2xl font-bold text-red-700 mb-4">Master Security Control</h2>
                <p class="text-red-600 mb-6 italic">Warning: Only the Admin can reset student passwords or clear the database.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="wipeDatabase()" class="bg-red-600 text-white p-4 rounded-xl font-bold">Destroy All Records</button>
                    <button onclick="showScreen('screen-teacher')" class="bg-white border border-slate-300 p-4 rounded-xl font-bold">Review Teacher Data</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- SECURE STORAGE CONFIG ---
        const SUBJECTS = ["Maths", "Science", "SST", "English", "Hindi", "IT"];
        let db = JSON.parse(localStorage.getItem('eduflow_secure_db')) || {
            students: {}, // { "10A-1": { name: "", pass: "123" } }
            results: {}   // { "10A-1_Annual": { marks: {}, remarks: "" } }
        };

        function save() { localStorage.setItem('eduflow_secure_db', JSON.stringify(db)); }

        // --- AUTHENTICATION ENGINE ---
        let sessionUser = null;

        function attemptSecureLogin() {
            const id = document.getElementById('auth-id').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();

            if (id === 'admin' && pass === 'admin789') {
                sessionUser = { role: 'admin' };
                renderAdmin();
            } else if (id === 'teacher' && pass === 'teacher123') {
                sessionUser = { role: 'teacher' };
                loadStudents();
                showScreen('screen-teacher');
            } else if (db.students[id] && db.students[id].pass === pass) {
                sessionUser = { role: 'parent', id: id };
                renderParent();
                showScreen('screen-parent');
            } else {
                alert("🔐 Access Denied: Incorrect ID or Password");
            }
        }

        // --- TEACHER LOGIC ---
        function loadStudents() {
            if (sessionUser.role !== 'teacher' && sessionUser.role !== 'admin') return;
            const cls = document.getElementById('class-filter').value;
            const tbody = document.getElementById('student-rows');
            tbody.innerHTML = '';

            for (let i = 1; i <= 45; i++) {
                const sId = `${cls}-${i}`;
                const data = db.students[sId] || { name: "", pass: "123" };
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3 text-slate-400 font-mono">${i}</td>
                        <td class="p-3"><input type="text" value="${data.name}" onchange="updateProfile('${sId}', 'name', this.value)" placeholder="Student Name" class="w-full bg-transparent outline-none focus:border-b border-indigo-400"></td>
                        <td class="p-3"><input type="text" value="${data.pass}" onchange="updateProfile('${sId}', 'pass', this.value)" class="w-20 text-xs bg-slate-50 border rounded p-1"></td>
                        <td class="p-3"><button onclick="editMarks('${sId}')" class="text-indigo-600 font-bold">Marks</button></td>
                    </tr>
                `;
            }
        }

        function updateProfile(id, field, val) {
            if (!db.students[id]) db.students[id] = { name: "", pass: "123" };
            db.students[id][field] = val;
            save();
        }

        // --- SECURITY LOGOUT ---
        function secureLogout() {
            sessionUser = null;
            location.reload();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const tag = document.getElementById('status-tag');
            tag.innerText = sessionUser.role;
            tag.className = `px-3 py-1 rounded-full text-xs font-bold uppercase block ${sessionUser.role === 'admin' ? 'bg-red-100 text-red-600' : 'bg-indigo-100 text-indigo-600'}`;
            document.getElementById('logout-btn').classList.remove('hidden');
        }

        function renderAdmin() {
            showScreen('screen-admin');
        }

        function renderParent() {
            const student = db.students[sessionUser.id];
            document.getElementById('parent-content').innerHTML = `
                <div class="bg-indigo-600 p-8 rounded-3xl text-white shadow-xl mb-6">
                    <h2 class="text-3xl font-bold">${student.name}</h2>
                    <p class="opacity-80">Roll ID: ${sessionUser.id}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-bold mb-4">Academic Report (Annual)</h3>
                    <div class="space-y-3" id="parent-marks-list">
                        <p class="text-slate-400 italic">Teacher has not finalized marks yet.</p>
                    </div>
                </div>
            `;
        }

        function wipeDatabase() {
            if (confirm("Delete everything?")) {
                db = { students: {}, results: {} };
                save();
                location.reload();
            }
        }
    </script>
</body>
</html>
