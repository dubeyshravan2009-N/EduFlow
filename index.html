<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow Pro | Full School Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">EDUFLOW <span class="text-slate-400 font-light">PRO</span></h1>
        <div class="flex items-center gap-4">
            <span id="role-badge" class="hidden px-3 py-1 rounded-full text-[10px] font-bold bg-indigo-100 text-indigo-600 uppercase"></span>
            <button id="logout-btn" onclick="location.reload()" class="hidden text-red-500 text-sm font-bold hover:underline">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <section id="screen-login" class="screen active">
            <div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-3xl shadow-2xl border border-slate-200">
                <h2 class="text-2xl font-bold mb-6 text-center">System Portal</h2>
                <div class="space-y-4">
                    <input id="auth-id" type="text" placeholder="Roll ID (e.g. 1A-1) or 'teacher'" class="w-full border rounded-xl p-3 outline-none focus:ring-2 ring-indigo-400 transition-all">
                    <input id="auth-pass" type="password" placeholder="Password" class="w-full border rounded-xl p-3 outline-none focus:ring-2 ring-indigo-400 transition-all">
                    <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">Sign In</button>
                </div>
                <div class="mt-6 pt-4 border-t text-center text-[10px] text-slate-400">
                    Staff: teacher / teacher123 | Admin: admin / admin789
                </div>
            </div>
        </section>

        <section id="screen-teacher" class="screen">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Select Class</label>
                        <select id="class-select" onchange="renderTeacherList()" class="w-full border p-2 rounded-lg bg-slate-50 font-bold mb-4">
                            </select>
                        <p class="text-[10px] text-slate-400 italic">Editing is auto-saved to local database.</p>
                    </div>
                </div>
                <div class="lg:col-span-3 bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                        <h3 class="font-bold text-slate-700">Student Enrollment (Roll 1-45)</h3>
                        <span id="class-label" class="bg-indigo-600 text-white text-xs px-2 py-1 rounded"></span>
                    </div>
                    <div class="max-h-[600px] overflow-y-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase">Roll</th>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase">Name</th>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase">Password</th>
                                    <th class="p-4 text-[10px] font-bold text-slate-400 uppercase text-center">Marks</th>
                                </tr>
                            </thead>
                            <tbody id="teacher-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="screen-marks" class="screen">
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="m-student-name" class="text-2xl font-bold">Manage Result</h2>
                    <select id="m-exam" onchange="loadExistingMarks()" class="border rounded-lg p-2 font-bold bg-slate-50">
                        <option>PT-1</option><option>PT-2</option><option>PT-3</option>
                        <option>Half-Yearly</option><option>Annual</option>
                    </select>
                </div>
                <div id="m-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    </div>
                <textarea id="m-remarks" placeholder="Teacher Remarks..." class="w-full border rounded-xl p-4 h-24 mb-4"></textarea>
                <div class="flex gap-2">
                    <button onclick="saveMarks()" class="flex-1 bg-green-600 text-white p-4 rounded-xl font-bold">Save Record</button>
                    <button onclick="showScreen('screen-teacher')" class="px-6 bg-slate-100 rounded-xl font-bold">Back</button>
                </div>
            </div>
        </section>

        <section id="screen-parent" class="screen">
            <div class="bg-indigo-600 p-8 rounded-3xl text-white shadow-xl mb-6">
                <h2 id="p-name" class="text-3xl font-bold">Student Name</h2>
                <p id="p-id" class="opacity-70 font-mono"></p>
            </div>
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold">Academic Performance</h3>
                    <select id="p-exam-view" onchange="renderParentReport()" class="border p-2 rounded-lg font-bold">
                        <option>PT-1</option><option>PT-2</option><option>PT-3</option>
                        <option>Half-Yearly</option><option>Annual</option>
                    </select>
                </div>
                <div id="p-marks-display" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div id="p-remarks-display" class="mt-6 p-4 bg-indigo-50 border-l-4 border-indigo-500 text-sm italic"></div>
            </div>
        </section>

    </main>

    <script>
        const SUBJECTS = ["Maths", "Science", "SST", "English", "Hindi", "IT", "GK", "NS"];
        let db = JSON.parse(localStorage.getItem('eduflow_v3')) || { students: {}, records: {} };
        let currentUser = null;
        let activeId = null;

        function sync() { localStorage.setItem('eduflow_v3', JSON.stringify(db)); }

        // --- AUTH & SECURITY ---
        function handleLogin() {
            const id = document.getElementById('auth-id').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();

            if (id === 'admin' && pass === 'admin789') {
                currentUser = { role: 'admin' };
                initTeacherView();
            } else if (id === 'teacher' && pass === 'teacher123') {
                currentUser = { role: 'teacher' };
                initTeacherView();
            } else if (db.students[id] && db.students[id].pass === pass) {
                currentUser = { role: 'parent', id: id };
                activeId = id;
                initParentView();
            } else {
                alert("🔐 Access Denied!");
            }
        }

        // --- TEACHER LOGIC ---
        function initTeacherView() {
            const select = document.getElementById('class-select');
            let options = '';
            for(let i=1; i<=10; i++) {
                ['A', 'B'].forEach(sec => { options += `<option value="${i}${sec}">${i}${sec}</option>`; });
            }
            select.innerHTML = options;
            renderTeacherList();
            showScreen('screen-teacher');
        }

        function renderTeacherList() {
            const cls = document.getElementById('class-select').value;
            document.getElementById('class-label').innerText = `Class ${cls}`;
            const tbody = document.getElementById('teacher-table-body');
            tbody.innerHTML = '';

            for(let i=1; i<=45; i++) {
                const sId = `${cls}-${i}`;
                const data = db.students[sId] || { name: "", pass: "123" };
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition-colors">
                        <td class="p-4 font-mono text-slate-400 text-xs">${i}</td>
                        <td class="p-4">
                            <input type="text" value="${data.name}" onchange="updateProfile('${sId}', 'name', this.value)" 
                            placeholder="Student Name" class="w-full bg-transparent outline-none border-b border-transparent focus:border-indigo-400">
                        </td>
                        <td class="p-4 text-xs">
                            <input type="text" value="${data.pass}" onchange="updateProfile('${sId}', 'pass', this.value)" 
                            class="w-20 bg-slate-100 rounded px-1 text-slate-500">
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="openMarksModal('${sId}')" class="text-indigo-600 font-bold text-xs hover:underline">Manage</button>
                        </td>
                    </tr>
                `;
            }
        }

        function updateProfile(id, field, val) {
            if(!db.students[id]) db.students[id] = { name: "", pass: "123" };
            db.students[id][field] = val;
            sync();
        }

        function openMarksModal(id) {
            if(!db.students[id] || !db.students[id].name) return alert("Please enter student name first.");
            activeId = id;
            document.getElementById('m-student-name').innerText = db.students[id].name;
            const grid = document.getElementById('m-grid');
            grid.innerHTML = SUBJECTS.map(sub => `
                <div class="bg-slate-50 p-3 rounded-xl">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">${sub}</label>
                    <input type="number" id="inp-${sub}" class="w-full bg-transparent font-bold outline-none">
                </div>
            `).join('');
            loadExistingMarks();
            showScreen('screen-marks');
        }

        function loadExistingMarks() {
            const exam = document.getElementById('m-exam').value;
            const rec = db.records[`${activeId}_${exam}`] || { marks: {}, remarks: "" };
            SUBJECTS.forEach(sub => document.getElementById(`inp-${sub}`).value = rec.marks[sub] || "");
            document.getElementById('m-remarks').value = rec.remarks || "";
        }

        function saveMarks() {
            const exam = document.getElementById('m-exam').value;
            const rec = { marks: {}, remarks: document.getElementById('m-remarks').value };
            SUBJECTS.forEach(sub => rec.marks[sub] = document.getElementById(`inp-${sub}`).value);
            db.records[`${activeId}_${exam}`] = rec;
            sync();
            alert("Record Saved!");
            showScreen('screen-teacher');
        }

        // --- PARENT LOGIC ---
        function initParentView() {
            document.getElementById('p-name').innerText = db.students[activeId].name;
            document.getElementById('p-id').innerText = `ID: ${activeId}`;
            renderParentReport();
            showScreen('screen-parent');
        }

        function renderParentReport() {
            const exam = document.getElementById('p-exam-view').value;
            const rec = db.records[`${activeId}_${exam}`];
            const display = document.getElementById('p-marks-display');
            const remDisplay = document.getElementById('p-remarks-display');

            if(!rec) {
                display.innerHTML = `<p class="col-span-2 text-slate-400 italic">No data released for ${exam}.</p>`;
                remDisplay.innerText = "No remarks yet.";
            } else {
                display.innerHTML = SUBJECTS.map(sub => `
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-slate-500 uppercase text-xs font-bold">${sub}</span>
                        <span class="font-black text-indigo-600">${rec.marks[sub] || 0}</span>
                    </div>
                `).join('');
                remDisplay.innerText = `"${rec.remarks || 'No remarks.'}"`;
            }
        }

        // --- UI HELPERS ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('logout-btn').classList.remove('hidden');
            const badge = document.getElementById('role-badge');
            badge.innerText = currentUser.role;
            badge.classList.remove('hidden');
        }
    </script>
</body>
</html>
